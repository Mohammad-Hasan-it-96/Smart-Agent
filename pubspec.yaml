name: smart_agent
description: A local offline order app built with Flutter.
publish_to: 'none'
version: 1.0.9+1009

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2

  # State management
  provider: ^6.1.1

  # App storage
  shared_preferences: ^2.2.2

  # PDF export
  pdf: ^3.10.4
  printing: ^5.12.0

  # Dependency injection
  get_it: ^8.0.0

  # One-time activation (HTTP)
  http: ^1.2.0
  device_info_plus: ^10.1.0
  android_id: ^0.4.0
  crypto: ^3.0.3
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5

  # Google Drive backup
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0

  # File sharing and picking
  share_plus: ^10.1.2
  file_picker: ^8.1.4


  # Push notifications
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # Bluetooth thermal printing (Sprint 5)
  blue_thermal_printer: ^1.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#1B3A6B"
  adaptive_icon_foreground: "assets/images/app_logo_safe.png"


flutter:
  uses-material-design: true
  
  # Fonts
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
  
  # Assets (for PDF font loading)
  assets:
    - assets/fonts/Cairo-Regular.ttf
    - assets/images/app_logo.png
    - assets/images/app_logo_safe.png

